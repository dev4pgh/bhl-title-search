<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BHL Title Search</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-body-tertiary">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-9 col-xl-8">
                <div class="mb-4">
                    <h1 class="display-5 fw-semibold">BHL Title Search</h1>
                    <p class="lead">
                        Search across all volumes/items in a Biodiversity Heritage Library title.
                    </p>
                </div>

                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="search-form">
                            <div class="mb-3">
                                <label for="title-id" class="form-label">BHL title ID</label>
                                <input id="title-id" name="title_id" type="number" class="form-control"
                                    value="{{ example_title_id }}" required>
                            </div>

                            <div class="mb-3">
                                <label for="text" class="form-label">Search text</label>
                                <input id="text" name="text" type="search" class="form-control"
                                    value="{{ example_text }}" required>
                            </div>

                            <button id="search-button" type="submit" class="btn btn-primary">
                                <span id="search-spinner" class="spinner-border spinner-border-sm me-2 d-none"
                                    aria-hidden="true"></span>
                                <span id="search-button-text">Search</span>
                            </button>
                        </form>
                    </div>
                </div>

                <div id="status" class="alert alert-secondary" role="status" aria-live="polite">
                    Submit a search to see results.
                </div>

                <div class="card shadow-sm">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h2 class="h5 mb-0">Results</h2>
                        <a href="/docs" class="small">API docs</a>
                    </div>
                    <div class="card-body">
                        <div id="results">
                            <p class="text-body-secondary mb-0">No results yet.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
