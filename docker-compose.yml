services:
  web:
    build: .
    container_name: bhl-title-search
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bhl-title-search.rule=Host(`${DOMAIN}`)"
      - "traefik.http.services.bhl-title-search.loadbalancer.server.port=8000"
    networks:
      - traefik-net
    restart: unless-stopped

networks:
  traefik-net:
    external: true
